<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#78c58e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="奶牛桌宠">
    <title>奶牛桌宠</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="apple-touch-icon" href="assets/icon.svg">
    <link rel="stylesheet" href="styles.css?v=9">
  </head>
  <body data-time="day">
    <main class="app-shell" aria-label="奶牛桌宠">
      <section class="topbar">
        <div>
          <h1>奶牛桌宠</h1>
          <p id="lastAction">刚刚搬进你的手机桌面</p>
        </div>
        <span id="moodBadge" class="mood-badge">开心</span>
      </section>

      <section class="speech" id="speech">哞！今天也很喜欢你。</section>

      <button class="cow-stage" id="cowButton" aria-label="摸摸奶牛">
        <span class="sleep-mark" id="sleepMark">Zz</span>
        <span class="model-layer" id="modelLayer" aria-hidden="true">
          <canvas id="cowCanvas"></canvas>
        </span>
        <span class="cow-lane" id="cowLane" aria-hidden="true">
          <span class="cow-shadow"></span>
          <span class="cow-model" id="cowModel">
            <span class="tail"><span></span></span>
            <span class="leg leg-back rear"><span class="hoof"></span></span>
            <span class="leg leg-back front"><span class="hoof"></span></span>
            <span class="body-core"><span class="belly"></span></span>
            <span class="neck"></span>
            <span class="head-core">
              <span class="horn horn-left"></span>
              <span class="horn horn-right"></span>
              <span class="ear ear-left"></span>
              <span class="ear ear-right"></span>
              <span class="forelock"></span>
              <span class="eye eye-left"></span>
              <span class="eye eye-right"></span>
              <span class="muzzle"><span></span><span></span></span>
            </span>
            <span class="leg leg-front rear"><span class="hoof"></span></span>
            <span class="leg leg-front front"><span class="hoof"></span></span>
          </span>
        </span>
      </button>

      <section class="stats" aria-label="奶牛状态">
        <div class="stat"><span>饥饿</span><meter id="hungerMeter" min="0" max="1" value="0.35"></meter></div>
        <div class="stat"><span>精力</span><meter id="energyMeter" min="0" max="1" value="0.75"></meter></div>
        <div class="stat"><span>亲密</span><meter id="affectionMeter" min="0" max="1" value="0.55"></meter></div>
      </section>

      <nav class="actions" aria-label="互动操作">
        <button data-action="feed"><span>🌿</span>喂草</button>
        <button data-action="pet"><span>👋</span>摸头</button>
        <button data-action="nap"><span>🌙</span>睡觉</button>
        <button data-action="clean"><span>✨</span>洗澡</button>
      </nav>
    </main>

    <script type="module" src="app.js?v=9"></script>
  </body>
</html>
